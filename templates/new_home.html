<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>AI Writing & Analysis</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="min-h-screen flex flex-col font-sans antialiased">

    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>

    <div class="relative isolate">
        <div class="mx-auto max-w-7xl px-8 py-24 lg:py-48 lg:flex lg:items-center lg:gap-24">
            
            <div class="lg:w-7/12">
                <div class="flex items-center gap-4 mb-14">
                    <div class="glass-panel p-3 rounded-2xl animate-float">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#6366f1" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2v4"/><path d="m4.93 4.93 2.83 2.83"/><path d="M2 12h4"/><path d="m4.93 19.07 2.83-2.83"/><path d="M12 18v4"/><path d="m19.07 19.07-2.83-2.83"/><path d="M18 12h4"/><path d="m19.07 4.93-2.83 2.83"/><path d="m12 9-1 3 1 3 3-1-3-1Z"/></svg>
                    </div>
                    <span class="text-xs font-black tracking-[0.3em] uppercase text-indigo-400">Intelligent Assistant</span>
                </div>
                
                <h1 class="text-6xl sm:text-7xl font-black text-slate-900 mb-8 tracking-tight leading-[1.05]">
                    Smart Writing. <br>
                    <span class="text-transparent bg-clip-text bg-gradient-to-r from-indigo-600 to-purple-500">
                        Deep Analysis.
                    </span>
                </h1>

                <p class="text-slate-500 text-xl mb-12 leading-relaxed max-w-xl">
                    Unlock insights from your documents or utilize our professional grading system for instant feedback.
                </p>

                <div class="glass-panel rounded-[2rem] inline-flex flex-col md:flex-row gap-6 items-center p-4 md:pr-8 shadow-xl">
                    <form action="/process" method="post" enctype="multipart/form-data" class="flex flex-col md:flex-row items-center gap-5">
                        <input type="file" name="pdf_docs" multiple required
                               class="text-sm text-slate-400 file:mr-4 file:py-3 file:px-6 file:rounded-xl file:border-0 file:text-sm file:font-bold file:bg-indigo-50 file:text-indigo-600 hover:file:bg-indigo-100 transition-all cursor-pointer">
                        
                        <button type="submit" class="btn-action w-full md:w-auto px-10 py-4 rounded-2xl font-bold text-lg">
                            Analyze PDF
                        </button>
                    </form>

                    <div class="hidden md:block h-10 w-[1px] bg-slate-200"></div>

                    <a href="/essay_grading" class="btn-action w-full md:w-auto text-center px-10 py-4 rounded-2xl font-bold text-lg">
                        Essay Grading
                    </a>
                </div>
            </div>

            <div class="mt-20 lg:mt-0 lg:w-5/12 flex justify-center lg:justify-end">
                <div class="relative group">
                    <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-[3rem] blur opacity-20 group-hover:opacity-40 transition duration-1000"></div>
                    
                    <div class="relative glass-panel rounded-[3rem] p-6 shadow-2xl">
                        <img src="https://res.cloudinary.com/dtsuvx8dz/image/upload/v1709048322/o3ad4w8hedswhwymbhr9.png" 
                             alt="Feature Preview" 
                             class="w-full max-w-[440px] rounded-[2rem]">
                    </div>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
