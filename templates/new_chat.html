<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>PDF Chat</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="min-h-screen relative">
    <div class="bg-blob-1"></div>
    <div class="bg-blob-2"></div>

    <section class="p-6 max-w-5xl mx-auto">
        <a href="/" class="mb-6 inline-flex items-center gap-2 text-indigo-600 font-bold hover:translate-x-[-4px] transition-transform">
            ← Back to Home
        </a>
        
        <div class="flex flex-col items-center">
            <h1 class="text-4xl font-black text-slate-900 mb-8 tracking-tight">PDF Intelligence</h1>
            
            <div class="w-full glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl flex flex-col">
                <div class="w-full py-4 px-8 border-b border-white/20 bg-white/30">
                    <h2 class="font-bold text-slate-700 flex items-center gap-2">
                        <span class="h-2 w-2 rounded-full bg-green-500"></span> Conversation
                    </h2>
                </div>
                
                <div id="chat-window" class="h-[500px] overflow-y-auto p-6 space-y-6">
                    {% if chat_history %}
                        {% for message in chat_history %}
                            <div class="flex flex-col w-full">
                                {% if message.role == 'User' %}
                                    <div class="chat-bubble user-bubble shadow-md">
                                        {{ message.content }}
                                    </div>
                                {% else %}
                                    <div class="chat-bubble ai-bubble shadow-sm">
                                        {{ message.content | safe }}
                                    </div>
                                {% endif %}
                            </div>
                        {% endfor %}
                    {% else %}
                        <div class="h-full flex flex-col items-center justify-center text-gray-400 italic">
                            <p>No messages yet. Ask something about your PDFs!</p>
                        </div>
                    {% endif %}
                </div>

                <form action="/chat" method="post" id="chat-form" class="p-6 bg-white/40 border-t border-white/20">
                    <div class="flex gap-3">
                        <input class="flex-1 bg-white border border-slate-200 rounded-2xl px-6 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500 transition-all shadow-inner" 
                               placeholder="Ask a question about your documents..." type="text" name="user_question" required>
                        
                        <button id="chat-btn" class="btn-action px-8 rounded-2xl font-bold" type="submit">
                            <span id="chat-loader" class="loader hidden mr-2"></span>
                            <span id="chat-btn-text">Submit</span>
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </section>

    <script src="{{ url_for('static', filename='js/loading.js') }}"></script>
    <script>
        initLoading('chat-form', 'chat-btn', 'chat-loader', 'chat-btn-text', 'Thinking...');
        
        // Auto-scroll to bottom on load
        const chatWindow = document.getElementById('chat-window');
        chatWindow.scrollTop = chatWindow.scrollHeight;
    </script>
</body>
</html>
