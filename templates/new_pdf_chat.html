<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>PDF AI Chat - Upload</title>
</head>
<body>
    <div class="relative isolate overflow-hidden bg-white">
        <svg class="absolute inset-0 -z-10 h-full w-full stroke-gray-200 [mask-image:radial-gradient(100%_100%_at_top_right,white,transparent)]" aria-hidden="true">
            <defs>
                <pattern id="grid-pattern-2" width="200" height="200" x="50%" y="-1" patternUnits="userSpaceOnUse">
                    <path d="M.5 200V.5H200" fill="none" />
                </pattern>
            </defs>
            <rect width="100%" height="100%" stroke-width="0" fill="url(#grid-pattern-2)" />
        </svg>

        <div class="mx-auto sm:h-screen w-screen flex flex-col sm:flex-row justify-center items-center px-6 pb-24 pt-10 lg:px-20 lg:py-20">
            <div class="mx-auto max-w-2xl lg:mx-0 lg:max-w-xl lg:flex-shrink-0 lg:pt-8">
                <img src="https://res.cloudinary.com/dtsuvx8dz/image/upload/v1710486664/hdbyd4gkogrzdk3lb23j.png" class="h-16 w-16 ml-4" alt="Logo">
                
                <div class="mt-10">
                    <span class="rounded-full bg-gradient-to-br from-green-300 via-blue-500 to-cyan-600 px-3 py-1 text-sm font-semibold leading-6 text-white ring-1 ring-inset ring-blue-600/10">
                        GPT-3.5 + LangChain
                    </span>
                </div>

                <h1 class="mt-10 text-4xl font-bold tracking-tight text-gray-900 sm:text-6xl">Chat with Your PDFs!</h1>
                <p class="mt-6 text-lg leading-8 text-gray-600">Effortlessly communicate with your documents. Upload multiple PDFs and start an AI-powered conversation immediately.</p>
                
                <form action="/process" method="post" enctype="multipart/form-data">
                    <div class="mt-10 flex flex-col justify-start items-start sm:flex-row sm:items-center gap-x-6 gap-y-4">
                        <input type="file" name="pdf_docs" id="pdf_docs" accept=".pdf" multiple required 
                            class="text-sm font-semibold leading-6 text-gray-900 border py-2 px-4 rounded-2xl block w-full text-slate-500 border-blue-500/30 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-400 hover:file:bg-blue-100">
                        
                        <button type="submit" class="whitespace-nowrap bg-gradient-to-bl from-green-300 via-blue-500 to-cyan-600 px-8 rounded-2xl py-2.5 text-sm font-semibold text-white shadow-sm hover:opacity-90">
                            Process Documents
                        </button>
                    </div>
                </form>
            </div>

            <div class="mx-auto mt-16 flex max-w-2xl sm:mt-24 lg:ml-10 lg:mr-0 lg:mt-0 lg:max-w-none lg:flex-none xl:ml-32">
                <img src="https://res.cloudinary.com/dtsuvx8dz/image/upload/v1708164754/gwohsoi1xgpuq2fmryay.png" alt="App screenshot" 
                    class="sm:w-[23rem] w-2/3 rounded-md drop-shadow-2xl">
            </div>
        </div>
    </div>
</body>
</html>
